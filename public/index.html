<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxFiles</title>
    <link rel="stylesheet" href="../assets/fm.css">
    <script>window.__FM_LOCALE__ = window.__FM_LOCALE__ || { locale: 'en', dir: 'ltr', messages: {} };</script>
    <script defer src="https://unpkg.com/alpinejs@3/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>
    <script src="../assets/fm.js"></script>
</head>
<body>
<div class="ff-app" x-data="fluxFilesApp()" x-init="init()">

    <!-- Topbar -->
    <div class="ff-topbar">
        <!-- Breadcrumb -->
        <div class="ff-breadcrumb">
            <template x-for="(crumb, idx) in breadcrumbs" :key="crumb.path">
                <template x-if="true">
                    <span style="display:flex;align-items:center;gap:4px;">
                        <span x-show="idx > 0" style="color:var(--ff-text-secondary);font-size:12px;">/</span>
                        <button @click="navigate(crumb.path)" x-text="crumb.name"></button>
                    </span>
                </template>
            </template>
        </div>

        <!-- Disk switcher -->
        <div class="ff-disk-switcher">
            <template x-for="disk in (config.disks || ['local'])" :key="disk">
                <button class="ff-disk-btn"
                        :class="{ active: currentDisk === disk }"
                        @click="switchDisk(disk)"
                        x-text="disk.toUpperCase()">
                </button>
            </template>
        </div>

        <!-- Search -->
        <div class="ff-search">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" :placeholder="t('toolbar.search_hint')" x-model="searchQuery">
        </div>

        <!-- View toggle -->
        <div class="ff-view-toggle">
            <button class="ff-view-btn" :class="{ active: view === 'grid' }" @click="view = 'grid'" :title="t('toolbar.grid_view')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                </svg>
            </button>
            <button class="ff-view-btn" :class="{ active: view === 'list' }" @click="view = 'list'" :title="t('toolbar.list_view')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                    <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
                    <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                </svg>
            </button>
        </div>

        <!-- New folder -->
        <button class="ff-btn" @click="createFolder()" :title="t('toolbar.new_folder')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                <line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
            </svg>
        </button>
    </div>

    <!-- Body -->
    <div class="ff-body">

        <!-- Sidebar -->
        <div class="ff-sidebar">
            <div class="ff-sidebar-section">
                <div class="ff-sidebar-title" x-text="t('sidebar.folders')"></div>
                <button class="ff-folder-item"
                        :class="{ active: currentPath === '' }"
                        @click="navigate('')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                    </svg>
                    <span x-text="t('common.root')"></span>
                </button>
                <template x-for="folder in folders" :key="folder.key">
                    <button class="ff-folder-item" @click="navigate(folder.key)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                        </svg>
                        <span x-text="folder.name"></span>
                    </button>
                </template>
            </div>
            <div class="ff-sidebar-section" style="margin-top:12px;">
                <button class="ff-folder-item"
                        :class="{ active: showTrash }"
                        @click="showTrash = !showTrash; if(showTrash) loadTrash();">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    <span x-text="t('sidebar.trash')"></span>
                </button>
            </div>
        </div>

        <!-- Main content -->
        <div class="ff-main">

            <!-- Drop zone -->
            <div class="ff-dropzone"
                 :class="{ active: dragActive }"
                 @click="triggerUpload()"
                 @dragover.prevent="dragActive = true"
                 @dragleave.prevent="dragActive = false"
                 @drop="handleDrop($event)">
                <input type="file" x-ref="fileInput" multiple @change="handleFileInput($event)">
                <template x-if="!uploading">
                    <div>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;margin-bottom:4px;">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p x-text="t('upload.drop_hint')"></p>
                    </div>
                </template>
                <template x-if="uploading">
                    <div class="ff-upload-progress" style="width:100%;">
                        <div class="ff-progress-bar">
                            <div class="ff-progress-fill" :style="'width:' + uploadProgress + '%'"></div>
                        </div>
                        <div class="ff-progress-text"><span x-text="t('upload.uploading')"></span> <span x-text="uploadProgress"></span>%</div>
                    </div>
                </template>
            </div>

            <!-- Bulk actions -->
            <div class="ff-bulk-bar" x-show="selected.length > 0 && !bulkBusy">
                <label class="ff-select-all" :title="t('file.items_selected', {count: selected.length})">
                    <input type="checkbox" :checked="allSelected" @change="toggleSelectAll()">
                    <span x-text="selected.length + '/' + filteredFiles.length"></span>
                </label>
                <div class="ff-bulk-actions">
                    <button class="ff-btn ff-btn-sm" @click="openBulkMove()" :title="t('file.move_to')" x-text="t('bulk.move')"></button>
                    <button class="ff-btn ff-btn-sm" @click="openCrossDisk('copy')" x-text="t('bulk.copy_to_disk')"></button>
                    <button class="ff-btn ff-btn-sm" @click="openCrossDisk('move')" x-text="t('bulk.move_to_disk')"></button>
                    <button class="ff-btn ff-btn-sm" @click="bulkDownload()" x-text="t('common.download')"></button>
                    <button class="ff-btn ff-btn-sm ff-btn-danger" @click="confirmDelete()" x-text="t('common.delete')"></button>
                    <button class="ff-btn ff-btn-sm" @click="deselectAll()" x-text="t('common.clear')"></button>
                </div>
            </div>

            <!-- Bulk progress -->
            <div class="ff-bulk-bar ff-bulk-progress-bar" x-show="bulkBusy">
                <span x-text="bulkAction + '... ' + bulkDone + '/' + bulkTotal"></span>
                <div class="ff-progress-bar" style="flex:1;margin-inline-start:12px;">
                    <div class="ff-progress-fill" :style="'width:' + bulkProgress + '%'"></div>
                </div>
                <span x-text="bulkProgress + '%'" style="margin-inline-start:8px;font-size:12px;"></span>
            </div>

            <!-- Loading -->
            <div class="ff-loading" x-show="loading">
                <div class="ff-spinner"></div>
            </div>

            <!-- Grid view -->
            <template x-if="!loading && view === 'grid'">
                <div>
                    <!-- Folders -->
                    <div class="ff-grid" x-show="filteredFolders.length > 0" style="margin-bottom:16px;">
                        <template x-for="folder in filteredFolders" :key="folder.key">
                            <div class="ff-card" @dblclick="navigate(folder.key)">
                                <div class="ff-card-icon folder">
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
                                    </svg>
                                </div>
                                <div class="ff-card-name" x-text="folder.name"></div>
                            </div>
                        </template>
                    </div>

                    <!-- Files -->
                    <div class="ff-grid" x-show="filteredFiles.length > 0">
                        <template x-for="file in filteredFiles" :key="file.key">
                            <div class="ff-card"
                                 :class="{ selected: isSelected(file) }"
                                 @click="handleFileClick(file, $event)"
                                 @dblclick="selectFile(file)">
                                <div x-show="hasMetaBadge(file)" class="ff-meta-badge"></div>
                                <div class="ff-card-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                                        <polyline points="14 2 14 8 20 8"/>
                                    </svg>
                                </div>
                                <div class="ff-card-name" x-text="file.name"></div>
                                <div class="ff-card-size" x-text="formatSize(file.size)"></div>
                            </div>
                        </template>
                    </div>

                    <!-- Empty -->
                    <div class="ff-empty" x-show="filteredFiles.length === 0 && filteredFolders.length === 0">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                        </svg>
                        <p x-text="t('file.no_files')"></p>
                    </div>
                </div>
            </template>

            <!-- List view -->
            <template x-if="!loading && view === 'list'">
                <div class="ff-list">
                    <div class="ff-list-header">
                        <input type="checkbox" :checked="allSelected" @change="toggleSelectAll()">
                        <span class="ff-list-name" x-text="t('file.name')"></span>
                        <span class="ff-list-size" x-text="t('file.size')"></span>
                        <span class="ff-list-date" x-text="t('file.modified')"></span>
                    </div>
                    <template x-for="folder in filteredFolders" :key="folder.key">
                        <div class="ff-list-row" @dblclick="navigate(folder.key)">
                            <svg viewBox="0 0 24 24" fill="#f59e0b" stroke="none">
                                <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
                            </svg>
                            <span class="ff-list-name" x-text="folder.name"></span>
                            <span class="ff-list-size">--</span>
                            <span class="ff-list-date">--</span>
                        </div>
                    </template>
                    <template x-for="file in filteredFiles" :key="file.key">
                        <div class="ff-list-row"
                             :class="{ selected: isSelected(file) }"
                             @click="handleFileClick(file, $event)"
                             @dblclick="selectFile(file)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                            </svg>
                            <span class="ff-list-name" x-text="file.name"></span>
                            <span class="ff-list-size" x-text="formatSize(file.size)"></span>
                            <span class="ff-list-date" x-text="formatDate(file.modified)"></span>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- Trash view -->
        <template x-if="showTrash">
            <div class="ff-main ff-trash-view" style="position:absolute;inset:0;inset-inline-start:var(--ff-sidebar-w);background:var(--ff-bg);z-index:10;overflow-y:auto;">
                <div style="padding:16px;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                        <h3 style="margin:0;" x-text="t('trash.title')"></h3>
                        <div style="display:flex;gap:6px;">
                            <button class="ff-btn ff-btn-sm" @click="bulkRestore()" x-show="trashItems.length > 0" x-text="t('trash.restore_all')"></button>
                            <button class="ff-btn ff-btn-sm ff-btn-danger" @click="confirmMessage = t('delete.confirm_bulk', {count: trashItems.length}); confirmAction = () => bulkPurge(); showConfirm = true;" x-show="trashItems.length > 0" x-text="t('trash.empty_trash')"></button>
                            <button class="ff-btn ff-btn-sm" @click="showTrash = false" x-text="t('common.close')"></button>
                        </div>
                    </div>
                    <div x-show="trashItems.length === 0" class="ff-empty" style="padding:40px 0;">
                        <p x-text="t('trash.empty')"></p>
                    </div>
                    <div class="ff-list">
                        <template x-for="item in trashItems" :key="item.file_key">
                            <div class="ff-list-row">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                </svg>
                                <span class="ff-list-name" x-text="item.file_key.split('/').pop()"></span>
                                <span class="ff-list-date" x-text="formatDate(item.trashed_at)"></span>
                                <button class="ff-btn ff-btn-sm" @click="restoreFile(item.file_key); loadTrash();" x-text="t('trash.restore')"></button>
                                <button class="ff-btn ff-btn-sm ff-btn-danger" @click="purgeFile(item.file_key)" x-text="t('file.purge')"></button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Detail panel -->
        <div class="ff-detail" x-show="detailFile" x-transition>
            <div class="ff-detail-header">
                <h3 x-text="detailFile?.name"></h3>
                <button class="ff-detail-close" @click="detailFile = null">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <!-- Preview -->
            <div class="ff-preview" x-show="detailFile">
                <template x-if="detailFile && isPreviewable(detailFile, 'image')">
                    <img :src="detailFile.url" :alt="detailFile.name" style="width:100%;max-height:200px;object-fit:contain;background:#f1f5f9;">
                </template>
                <template x-if="detailFile && isPreviewable(detailFile, 'video')">
                    <video controls style="width:100%;max-height:200px;" :src="detailFile.url"></video>
                </template>
                <template x-if="detailFile && isPreviewable(detailFile, 'audio')">
                    <audio controls style="width:100%;" :src="detailFile.url"></audio>
                </template>
                <template x-if="detailFile && isPreviewable(detailFile, 'pdf')">
                    <embed :src="detailFile.url" type="application/pdf" style="width:100%;height:200px;">
                </template>
            </div>

            <!-- Tabs -->
            <div class="ff-detail-tabs">
                <button class="ff-tab-btn" :class="{ active: activeTab === 'info' }" @click="activeTab = 'info'" x-text="t('metadata.tab_info')"></button>
                <button class="ff-tab-btn" :class="{ active: activeTab === 'seo' }" @click="activeTab = 'seo'" x-text="t('metadata.tab_seo')"></button>
                <button class="ff-tab-btn"
                        :class="{ active: activeTab === 'ai' }"
                        @click="activeTab = 'ai'"
                        x-show="detailFile && isPreviewable(detailFile, 'image')"
                        x-text="t('metadata.tab_ai')"></button>
                <button class="ff-tab-btn"
                        :class="{ active: activeTab === 'crop' }"
                        @click="activeTab = 'crop'; initCrop()"
                        x-show="detailFile && isPreviewable(detailFile, 'image')"
                        x-text="t('metadata.tab_crop')"></button>
            </div>

            <!-- Info tab -->
            <div class="ff-detail-body" x-show="activeTab === 'info'">
                <dl>
                    <div class="ff-detail-row">
                        <dt x-text="t('file.size')"></dt>
                        <dd x-text="formatSize(detailFile?.size)"></dd>
                    </div>
                    <div class="ff-detail-row">
                        <dt x-text="t('file.modified')"></dt>
                        <dd x-text="formatDate(detailFile?.modified)"></dd>
                    </div>
                    <div class="ff-detail-row">
                        <dt x-text="t('file.disk')"></dt>
                        <dd x-text="currentDisk"></dd>
                    </div>
                    <div class="ff-detail-row">
                        <dt x-text="t('file.path')"></dt>
                        <dd class="ff-file-path" style="word-break:break-all;font-size:12px;" x-text="detailFile?.key"></dd>
                    </div>
                </dl>

                <div class="ff-detail-actions">
                    <button class="ff-btn ff-btn-primary" @click="selectFile(detailFile)" x-text="t('common.select_file')"></button>
                    <button class="ff-btn" @click="copyUrl(detailFile)" x-text="t('toolbar.copy_url')"></button>
                    <button class="ff-btn" @click="downloadFile(detailFile)" x-text="t('common.download')"></button>
                    <button class="ff-btn ff-btn-danger" @click="selected = [detailFile]; confirmDelete()" x-text="t('common.delete')"></button>
                </div>
            </div>

            <!-- SEO tab -->
            <div class="ff-detail-body" x-show="activeTab === 'seo'">
                <div class="ff-meta-form">
                    <div class="ff-meta-field">
                        <label x-text="t('metadata.title')"></label>
                        <input type="text" x-model="metaForm.title" @input="watchMeta()" :placeholder="t('metadata.title_hint')">
                    </div>
                    <div class="ff-meta-field">
                        <label x-text="t('metadata.alt_text')"></label>
                        <input type="text" x-model="metaForm.alt_text" @input="watchMeta()" :placeholder="t('metadata.alt_hint')">
                    </div>
                    <div class="ff-meta-field">
                        <label x-text="t('metadata.caption')"></label>
                        <textarea x-model="metaForm.caption" @input="watchMeta()" :placeholder="t('metadata.caption_hint')" rows="3"></textarea>
                    </div>
                    <div class="ff-meta-saving" x-show="metaSaving" x-text="t('metadata.saving')"></div>
                </div>
            </div>

            <!-- AI Tags tab -->
            <div class="ff-detail-body" x-show="activeTab === 'ai'">
                <div style="margin-bottom:12px;">
                    <button class="ff-btn ff-btn-primary ff-btn-sm"
                            :disabled="aiTagging"
                            @click="aiTag()">
                        <span x-show="!aiTagging" x-text="t('ai.generate')"></span>
                        <span x-show="aiTagging" x-text="t('ai.analyzing')"></span>
                    </button>
                </div>
                <div x-show="aiTags.length > 0" style="margin-bottom:12px;">
                    <label style="font-size:12px;color:var(--ff-text-secondary);display:block;margin-bottom:6px;" x-text="t('ai.tags')"></label>
                    <div style="display:flex;flex-wrap:wrap;gap:4px;">
                        <template x-for="(tag, idx) in aiTags" :key="idx">
                            <span class="ff-tag">
                                <span x-text="tag"></span>
                                <button @click="removeTag(idx)">&times;</button>
                            </span>
                        </template>
                    </div>
                </div>
                <div x-show="aiTags.length === 0 && !aiTagging" class="ff-empty" style="padding:20px 0;">
                    <p x-text="t('ai.no_tags')"></p>
                </div>
                <div x-show="aiTagging" style="padding:20px 0;text-align:center;">
                    <div class="ff-spinner"></div>
                    <p style="margin-top:8px;font-size:13px;color:var(--ff-text-secondary);" x-text="t('ai.analyzing_image')"></p>
                </div>
            </div>

            <!-- Crop tab -->
            <div class="ff-detail-body ff-crop-panel" x-show="activeTab === 'crop'">
                <!-- Aspect ratio presets -->
                <div class="ff-crop-aspects">
                    <button class="ff-btn ff-btn-sm" :class="{ 'ff-btn-primary': cropAspect === null }" @click="setCropAspect(null)" x-text="t('crop.free')"></button>
                    <button class="ff-btn ff-btn-sm" :class="{ 'ff-btn-primary': cropAspect === '1:1' }" @click="setCropAspect('1:1')">1:1</button>
                    <button class="ff-btn ff-btn-sm" :class="{ 'ff-btn-primary': cropAspect === '4:3' }" @click="setCropAspect('4:3')">4:3</button>
                    <button class="ff-btn ff-btn-sm" :class="{ 'ff-btn-primary': cropAspect === '16:9' }" @click="setCropAspect('16:9')">16:9</button>
                    <button class="ff-btn ff-btn-sm" :class="{ 'ff-btn-primary': cropAspect === '3:2' }" @click="setCropAspect('3:2')">3:2</button>
                </div>

                <!-- Crop canvas -->
                <div class="ff-crop-container"
                     x-ref="cropContainer"
                     @mousedown="cropMouseDown($event)"
                     @mousemove="cropMouseMove($event)"
                     @mouseup="cropMouseUp()"
                     @mouseleave="cropMouseUp()">
                    <img x-ref="cropImage"
                         :src="detailFile?.url"
                         :alt="detailFile?.name"
                         draggable="false"
                         style="width:100%;display:block;user-select:none;">

                    <div class="ff-crop-overlay" x-show="cropData.w > 0 && cropData.h > 0"></div>

                    <div class="ff-crop-selection"
                         x-show="cropData.w > 0 && cropData.h > 0"
                         :style="cropStyle">
                        <div class="ff-crop-handle tl"></div>
                        <div class="ff-crop-handle tr"></div>
                        <div class="ff-crop-handle bl"></div>
                        <div class="ff-crop-handle br"></div>
                    </div>
                </div>

                <div class="ff-crop-info" x-show="cropData.w > 0">
                    <span x-text="cropInfo"></span>
                </div>

                <div class="ff-crop-inputs">
                    <div class="ff-crop-input-group">
                        <label>X</label>
                        <input type="number" x-model.number="cropData.x" min="0" :max="_cropNatW">
                    </div>
                    <div class="ff-crop-input-group">
                        <label>Y</label>
                        <input type="number" x-model.number="cropData.y" min="0" :max="_cropNatH">
                    </div>
                    <div class="ff-crop-input-group">
                        <label>W</label>
                        <input type="number" x-model.number="cropData.w" min="1" :max="_cropNatW - cropData.x">
                    </div>
                    <div class="ff-crop-input-group">
                        <label>H</label>
                        <input type="number" x-model.number="cropData.h" min="1" :max="_cropNatH - cropData.y">
                    </div>
                </div>

                <div class="ff-crop-actions">
                    <button class="ff-btn ff-btn-primary ff-btn-sm"
                            :disabled="cropData.w <= 0 || cropData.h <= 0 || cropSaving"
                            @click="saveCrop('replace')">
                        <span x-show="!cropSaving" x-text="t('crop.replace')"></span>
                        <span x-show="cropSaving" x-text="t('crop.saving')"></span>
                    </button>
                    <button class="ff-btn ff-btn-sm"
                            :disabled="cropData.w <= 0 || cropData.h <= 0 || cropSaving"
                            @click="saveCrop('copy')" x-text="t('crop.save_copy')"></button>
                    <button class="ff-btn ff-btn-sm" @click="cancelCrop(); activeTab = 'info'" x-text="t('common.cancel')"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm dialog -->
    <div class="ff-confirm-overlay" x-show="showConfirm" x-transition>
        <div class="ff-confirm-box">
            <h4 x-text="t('delete.confirm_title')"></h4>
            <p x-text="confirmMessage"></p>
            <div class="ff-confirm-actions">
                <button class="ff-btn" @click="showConfirm = false" x-text="t('common.cancel')"></button>
                <button class="ff-btn ff-btn-danger" @click="confirmAction && confirmAction()" x-text="t('common.delete')"></button>
            </div>
        </div>
    </div>

    <!-- Bulk move dialog (same disk) -->
    <div class="ff-confirm-overlay" x-show="showBulkMove" x-transition>
        <div class="ff-confirm-box">
            <h4 x-text="t('bulk.move_to_folder')"></h4>
            <p x-text="t('file.items_selected', {count: selected.length}) + ' — ' + currentDisk.toUpperCase()"></p>

            <div class="ff-meta-field" style="margin:12px 0;">
                <label x-text="t('bulk.destination')"></label>
                <input type="text"
                       x-model="bulkMoveTarget"
                       placeholder="e.g. photos/2024"
                       style="width:100%;padding:8px;border:1px solid var(--ff-border);border-radius:4px;background:var(--ff-bg);color:var(--ff-text);">
            </div>

            <div x-show="folders.length > 0" style="margin-bottom:12px;">
                <label style="font-size:12px;color:var(--ff-text-secondary);display:block;margin-bottom:4px;" x-text="t('bulk.quick_pick')"></label>
                <div style="display:flex;flex-wrap:wrap;gap:4px;">
                    <template x-for="folder in folders" :key="folder.key">
                        <button class="ff-btn ff-btn-sm"
                                :class="{ 'ff-btn-primary': bulkMoveTarget === folder.key }"
                                @click="bulkMoveTarget = folder.key"
                                x-text="folder.name"></button>
                    </template>
                    <button class="ff-btn ff-btn-sm"
                            :class="{ 'ff-btn-primary': bulkMoveTarget === '' }"
                            @click="bulkMoveTarget = ''" x-text="t('common.root')"></button>
                </div>
            </div>

            <div class="ff-confirm-actions">
                <button class="ff-btn" @click="showBulkMove = false" x-text="t('common.cancel')"></button>
                <button class="ff-btn ff-btn-primary" @click="executeBulkMove()" x-text="t('common.move')"></button>
            </div>
        </div>
    </div>

    <!-- Cross-disk copy/move dialog -->
    <div class="ff-confirm-overlay" x-show="showCrossDisk" x-transition>
        <div class="ff-confirm-box">
            <h4 x-text="crossDiskMode === 'copy' ? t('bulk.copy_to_disk') : t('bulk.move_to_disk')"></h4>
            <p x-text="t('file.items_selected', {count: selected.length}) + ' — ' + currentDisk.toUpperCase()"></p>

            <div class="ff-meta-field" style="margin:12px 0;">
                <label x-text="t('bulk.target_disk')"></label>
                <select x-model="crossDiskTarget" style="width:100%;padding:8px;border:1px solid var(--ff-border);border-radius:4px;background:var(--ff-bg);color:var(--ff-text);">
                    <option value="" x-text="t('bulk.select_disk')"></option>
                    <template x-for="d in availableDisks" :key="d">
                        <option :value="d" x-text="d.toUpperCase()"></option>
                    </template>
                </select>
            </div>

            <div class="ff-meta-field" style="margin:12px 0;">
                <label x-text="t('bulk.destination')"></label>
                <input type="text"
                       x-model="crossDiskPath"
                       placeholder="e.g. photos/2024"
                       style="width:100%;padding:8px;border:1px solid var(--ff-border);border-radius:4px;background:var(--ff-bg);color:var(--ff-text);">
            </div>

            <div class="ff-confirm-actions">
                <button class="ff-btn" @click="cancelCrossDisk()" x-text="t('common.cancel')"></button>
                <button class="ff-btn ff-btn-primary"
                        :disabled="!crossDiskTarget"
                        @click="executeCrossDisk()"
                        x-text="crossDiskMode === 'copy' ? t('common.copy') : t('common.move')"></button>
            </div>
        </div>
    </div>

</div>
</body>
</html>
