name: Split Packages

on:
  push:
    tags: ['v*']

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - local: 'adapters/laravel'
            remote: 'fluxfiles-laravel'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Split and push ${{ matrix.package.remote }}
        env:
          PAT_TOKEN: ${{ secrets.SPLIT_TOKEN }}
          REMOTE_REPO: ${{ matrix.package.remote }}
          PKG_DIR: ${{ matrix.package.local }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SPLIT_SHA=$(git subtree split -P "$PKG_DIR" -b split-branch)

          REMOTE_URL="https://x-access-token:${PAT_TOKEN}@github.com/thai-pc/${REMOTE_REPO}.git"

          git remote add target "$REMOTE_URL"
          git push -f target split-branch:main
          git tag -f "$TAG_NAME" split-branch
          git push -f target "$TAG_NAME"
