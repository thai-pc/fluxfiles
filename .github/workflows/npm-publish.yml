name: Publish npm packages

on:
  push:
    tags: ['v*']

jobs:
  publish-sdk:
    name: Publish SDK (fluxfiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish (skip if version exists)
        working-directory: packages/sdk
        run: npm publish || echo "Version already published, skipping."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-adapters:
    name: Publish ${{ matrix.adapter }} adapter
    runs-on: ubuntu-latest
    strategy:
      matrix:
        adapter: [react, vue]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: packages/${{ matrix.adapter }}
        run: npm install

      - name: Build
        working-directory: packages/${{ matrix.adapter }}
        run: npm run build

      - name: Publish (skip if version exists)
        working-directory: packages/${{ matrix.adapter }}
        run: npm publish --access public || echo "Version already published, skipping."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
